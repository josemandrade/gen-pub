backend:
  replicas: 1
  hpa:
    enabled: false
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m

frontend:
  replicas: 1
  resources:
    requests:
      memory: 32Mi
      cpu: 25m
    limits:
      memory: 64Mi
      cpu: 50m

postgresql:
  storage: 1Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m

ingress:
  tls:
    enabled: false

uploads:
  storage: 1Gi

secrets:
  db:
    database: generador_publicidad
    username: postgres
    password: postgres
  jwt:
    secret: devSecretKeyForLocalDev
  openai:
    apiKey: ""
