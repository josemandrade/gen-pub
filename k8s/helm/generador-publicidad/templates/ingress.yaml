{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "generador-publicidad.fullname" . }}
  namespace: {{ include "generador-publicidad.namespace" . }}
  labels:
    {{- include "generador-publicidad.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ include "generador-publicidad.frontendDomain" . }}
        - {{ include "generador-publicidad.backendDomain" . }}
      secretName: {{ include "generador-publicidad.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ include "generador-publicidad.frontendDomain" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "generador-publicidad.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
    - host: {{ include "generador-publicidad.backendDomain" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "generador-publicidad.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
{{- end }}
