apiVersion: v1
kind: Secret
metadata:
  name: {{ include "generador-publicidad.fullname" . }}-db
  namespace: {{ include "generador-publicidad.namespace" . }}
  labels:
    {{- include "generador-publicidad.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.secrets.db.database | quote }}
  POSTGRES_USER: {{ .Values.secrets.db.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.db.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "generador-publicidad.fullname" . }}-app
  namespace: {{ include "generador-publicidad.namespace" . }}
  labels:
    {{- include "generador-publicidad.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwt.secret | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openai.apiKey | quote }}
