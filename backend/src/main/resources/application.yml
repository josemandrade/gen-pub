spring:
  application:
    name: generador-publicidad
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:defaultSecretKeyThatMustBeChangedInProduction123}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
