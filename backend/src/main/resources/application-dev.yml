spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/generador_publicidad
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
  flyway:
    enabled: true

logging:
  level:
    com.generadorpublicidad: DEBUG
    org.springframework.security: DEBUG
